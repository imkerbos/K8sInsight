{{- if and (eq .Values.exposure.mode "gateway") .Values.gateway.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "k8sinsight.fullname" . }}
  labels:
    {{- include "k8sinsight.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.gateway.className }}
  ingressClassName: {{ .Values.gateway.className }}
  {{- end }}
  rules:
    {{- range .Values.gateway.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: frontend
                port:
                  number: {{ $.Values.frontend.service.port }}
          {{- end }}
    {{- end }}
  {{- if .Values.gateway.tls }}
  tls:
    {{- toYaml .Values.gateway.tls | nindent 4 }}
  {{- end }}
{{- end }}
