---
# 1. CrashLoopBackOff - 容器立即退出，不断重启
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crash-loop-demo
  namespace: k8sinsight-test
  labels:
    app: crash-loop-demo
    test-scenario: crashloop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crash-loop-demo
  template:
    metadata:
      labels:
        app: crash-loop-demo
    spec:
      containers:
        - name: crash
          image: busybox:1.36
          command: ["sh", "-c", "echo 'starting...'; exit 1"]
---
# 2. ImagePullBackOff - 拉取不存在的镜像
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-pull-fail-demo
  namespace: k8sinsight-test
  labels:
    app: image-pull-fail-demo
    test-scenario: imagepull
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-pull-fail-demo
  template:
    metadata:
      labels:
        app: image-pull-fail-demo
    spec:
      containers:
        - name: bad-image
          image: registry.example.com/nonexistent/image:v999
---
# 3. OOMKilled - 内存超限被杀
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-killed-demo
  namespace: k8sinsight-test
  labels:
    app: oom-killed-demo
    test-scenario: oom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-killed-demo
  template:
    metadata:
      labels:
        app: oom-killed-demo
    spec:
      containers:
        - name: oom
          image: python:3.12-alpine
          command:
            - python3
            - -c
            - |
              import time
              print("start oom demo", flush=True)
              leaked = []
              while True:
                  leaked.append(bytearray(2 * 1024 * 1024))  # 每次分配 2MiB
                  print(f"allocated={len(leaked)*2}MiB", flush=True)
                  time.sleep(0.2)
          resources:
            limits:
              memory: "24Mi"
            requests:
              memory: "8Mi"
---
# 4. ErrorExit - 非零退出码
apiVersion: apps/v1
kind: Deployment
metadata:
  name: error-exit-demo
  namespace: k8sinsight-test
  labels:
    app: error-exit-demo
    test-scenario: errorexit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: error-exit-demo
  template:
    metadata:
      labels:
        app: error-exit-demo
    spec:
      containers:
        - name: error-exit
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Running task...'; sleep 5; echo 'Fatal error occurred'; exit 137"]
---
# 5. FailedScheduling - 请求不可能满足的资源
apiVersion: apps/v1
kind: Deployment
metadata:
  name: failed-schedule-demo
  namespace: k8sinsight-test
  labels:
    app: failed-schedule-demo
    test-scenario: scheduling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: failed-schedule-demo
  template:
    metadata:
      labels:
        app: failed-schedule-demo
    spec:
      containers:
        - name: hungry
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "100"
              memory: "512Gi"
---
# 6. 正常运行的 Pod 做对照
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-app-demo
  namespace: k8sinsight-test
  labels:
    app: healthy-app-demo
    test-scenario: healthy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthy-app-demo
  template:
    metadata:
      labels:
        app: healthy-app-demo
    spec:
      containers:
        - name: healthy
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Healthy pod running'; while true; do sleep 60; done"]
---
# 7. 配置错误 - 引用不存在的 ConfigMap
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-error-demo
  namespace: k8sinsight-test
  labels:
    app: config-error-demo
    test-scenario: configerror
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-error-demo
  template:
    metadata:
      labels:
        app: config-error-demo
    spec:
      containers:
        - name: config-err
          image: busybox:1.36
          command: ["sleep", "3600"]
          envFrom:
            - configMapRef:
                name: nonexistent-config-map
